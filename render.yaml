services:
  - type: web
    name: tcams-vote
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/tcams_poll.db
