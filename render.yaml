services:
  - type: web
    name: tcams-vote
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////tmp/tcams_poll.db
